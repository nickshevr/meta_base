name: CI

on:
  push:
  pull_request:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest mypy

      - name: Run unit tests
        run: pytest -q

      - name: Run type checks
        run: mypy src
